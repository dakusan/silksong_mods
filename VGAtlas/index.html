<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
		<title>VGAtlas</title>
		<style>
			html, body { width:100%; height:100%; margin:0; overflow:hidden; }
			body { position:fixed; font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
			body.Loading { cursor:progress; }
			#map { position:fixed; inset:0; overflow:hidden; color:var(--text-color, #eee); background:var(--body-bg, black); }
			#map>div { display:flex; width:100%; height:100%; font-size:30px; justify-content:center; align-items:center; }
			#MainMenu { display:none; }
		</style>
		<link rel=icon href='favicon.ico'>
	</head>
	<body class='ThemeBase Loading'>
		<div id=map><div>Loading…</div></div>
		<div id=MainMenu>
			<div class=PopupButton></div>
			<div class=Popup>
				<div class="MenuItem TranslationEl" id=MenuOpenCategories data-translation-key="Category States" data-translation-section=SettingNames>Category States</div>
				<div class="MenuItem TranslationEl" id=MenuOpenSearch data-translation-key="SearchWindow.Title" data-translation-default=Search>Search</div>
				<div class="MenuItem TranslationEl" id=MenuLoadSave data-translation-key=WINDOW_TITLE data-translation-section=LoadSaveFile data-translation-default="Load Save">Load Save</div>
				<div class="MenuItem TranslationEl" id=MenuOpenConfig data-translation-key=Configure data-translation-section=ConfigWindow data-translation-module=Default data-translation-default=Settings>Settings</div>
				<div class="MenuItem TranslationEl" id=MenuOpenLogs data-translation-key=Logs>Logs</div>
				<div class=MenuItem><a class=TranslationEl href="https://silksong.dakusan.com" data-translation-key=SilksongModsLink data-translation-default="Silksong Mods">Silksong Mods</a> 🔗</div>
			</div>
		</div>
		<script type=module src='src/Main.ts'></script>
	</body>
</html>
